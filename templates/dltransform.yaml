transform:
  log: './dltransform-transform.log'
  input: 
    path: './input'
    encoding: 'utf8'
  output:
    path: './output'
    encoding: 'utf8'
  functions:
    - function: format-document
      enable: true
    - function: replace
      enable: true
      table:
        - from: '鈍왠놋'
          to: '嶝건늳'
        - from: '鈍쩐높'
          to: '嶝쩐닢'

concat:
  input: 
    path: './input'
    encoding: 'utf8'
  output:
    path: './output'
    encoding: 'utf8'

split:
  input: 
    path: './input'
    encoding: 'utf8'
  output:
    raw:
      path: './raw'
      encoding: 'utf8'
    translation:
      path: './translation'
      encoding: 'utf8'

merge:
  input:
    raw:
      path: './raw'
      encoding: 'utf8'
    translation:
      path: './translation'
      encoding: 'utf8'
  output: 
    digits: 5
    tag: 'txt'
    path: './input'
    encoding: 'utf8'


