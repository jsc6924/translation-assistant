#常用的encoding: ['utf8', 'utf8-bom', 'utf16le', 'utf16le-bom', 'utf16be', 'utf16be-bom', 'shift-jis', 'gb2312', 'gbk'];
#*.input.encoding也可以填auto（自动识别）

concat:
  input: 
    path: './output'
    encoding: 'auto'
  output:
    path: './concated'
    encoding: 'utf16le-bom'

